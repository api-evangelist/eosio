specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: EOSIO
providerId: eosio
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Blockchain
  - Antelope
  - EOS
  - Open Source
description: 'FinOps view of EOSIO/Antelope: no vendor invoice. Direct costs are (a) infrastructure to
  run a self-hosted nodeos and (b) on-chain CPU/NET/RAM purchased through PowerUp, REX, or RAM market
  to submit transactions. There is no SaaS billing surface from the upstream project.'
sources:
  - https://eosnetwork.com/
  - https://github.com/AntelopeIO/leap
notes: No vendor invoice exists for the EOSIO/Antelope protocol. Cost is split between infrastructure
  (compute/storage) and on-chain resources (CPU/NET/RAM market prices, denominated in EOS).
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: EOS Network Foundation
serviceCategory: Blockchain Infrastructure
billingModel:
  pricingCategory: Open Source + On-Chain Resource Markets
  billingFrequency: Continuous (on-chain)
  billingCurrency: EOS (on-chain), USD (infra)
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: EOSIO
  ServiceCategory: Blockchain Infrastructure
  ProviderName: EOSIO
  PublisherName: EOS Network Foundation
  InvoiceIssuerName: N/A (open source / on-chain)
  BillingCurrency: EOS
meters:
  - name: cpu_microseconds_consumed
    unit: microseconds
    aggregation: sum
    dimensions:
      - account
      - action
  - name: net_bytes_consumed
    unit: bytes
    aggregation: sum
    dimensions:
      - account
      - action
  - name: ram_bytes_held
    unit: bytes
    aggregation: max
    dimensions:
      - account
  - name: powerup_purchases
    unit: EOS
    aggregation: sum
    dimensions:
      - account
      - resource_type
  - name: node_compute_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - environment
      - region
principles:
  - name: Visibility
    description: Use get_account, get_powerup_state, and history APIs to track on-chain CPU/NET/RAM consumption
      per account; monitor self-hosted nodeos cost via your cloud bill.
  - name: Allocation
    description: Use one EOS account per workload or team so on-chain resource burn is attributable;
      tag self-hosted node compute by environment.
  - name: Optimization
    description: Prefer PowerUp rentals over staking when usage is bursty; batch actions per transaction
      to amortize NET overhead; right-size nodeos hardware (history nodes are RAM-heavy).
  - name: Accountability
    description: Treasury or platform team owns nodeos infrastructure; product teams own their on-chain
      account budgets and PowerUp top-ups.
maintainers:
