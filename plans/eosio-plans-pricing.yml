specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: EOSIO
providerId: eosio
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Antelope
  - Blockchain
  - EOS
  - Open Source
description: EOSIO (now the Antelope protocol) is free, open-source blockchain software. There is no
  vendor-issued price list. The reference node software (nodeos) is self-hosted; the relevant economics
  are on-chain resource costs (CPU, NET, RAM) priced and metered by the EOS mainnet itself, which is
  outside this provider's commercial control. Many block-producer operators run public RPC endpoints
  on a free, best-effort basis; commercial RPC providers (Greymass, EOS Nation, etc.) may price their
  managed endpoints separately.
sources:
  - https://eosnetwork.com/
  - https://github.com/AntelopeIO/leap
  - https://developers.eos.io/
notes: No public price list from EOSIO/Antelope itself. On-chain resource pricing (CPU/NET/RAM) is set
  by the network and changes continuously; commercial managed-RPC pricing should be reconciled per vendor.
plans:
  - id: eosio-open-source-node
    name: Self-Hosted Node Software
    type: freemium
    description: nodeos and the Antelope protocol distributed under MIT-style open-source licenses.
      Free to download, build, and operate; users pay only for their own infrastructure.
    entries:
      - label: Software license
        name: license
        type: flat
        metric: license
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: nodeos open-source software
      - name: All chain/history/producer plugins
      - name: Community support
  - id: eosio-onchain-resources
    name: On-Chain Resources (EOS Mainnet)
    type: usage-based
    description: To submit transactions on the EOS mainnet, accounts must hold staked or rented CPU/NET
      and own RAM. Prices are set on-chain via PowerUp / REX and fluctuate with demand.
    entries:
      - label: CPU/NET via PowerUp
        name: powerup_cpu_net
        type: metered
        metric: ms_cpu_or_byte_net
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see on-chain PowerUp market
        userMultiplied: false
      - label: RAM purchase
        name: ram_purchase
        type: metered
        metric: byte_ram
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see RAM market
        userMultiplied: false
    elements:
      - name: PowerUp CPU/NET rental
      - name: RAM market purchase
      - name: REX staking pool
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
