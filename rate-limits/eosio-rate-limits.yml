specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: EOSIO
providerId: eosio
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Blockchain
  - Antelope
  - EOS
  - Open Source
description: EOSIO/Antelope has no centralized rate-limit authority. The nodeos HTTP plugins (chain_api,
  history_api, producer_api) are operated by independent block producers and infrastructure providers;
  each operator sets its own throttle policy. On-chain, write throughput is bounded by the account's
  CPU/NET resource budget rather than a request-per-second limit. The values below are illustrative of
  what an operator typically configures rather than a centrally-published quota.
sources:
  - https://github.com/AntelopeIO/leap
  - https://developers.eos.io/
  - https://eosnetwork.com/
notes: Rate-limits are operator-specific. Replace with the limits published by the specific RPC endpoint
  you connect to (e.g. eos.greymass.com, eos.eosn.io).
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Operator-configured HTTP throttle
    scope: client-ip
    metric: varies
    limit: operator-defined per public RPC endpoint
  - name: On-chain CPU budget
    scope: account
    metric: microseconds_cpu
    limit: account's staked or PowerUp-rented CPU
    notes: Transaction throughput per account is enforced on-chain by CPU consumption, not by HTTP throttling.
  - name: On-chain NET budget
    scope: account
    metric: bytes_net
    limit: account's staked or PowerUp-rented NET
policies:
  - name: Open-source operator autonomy
    description: Each public-RPC operator sets its own per-IP and per-method throttles; the upstream
      project does not publish quotas.
  - name: Resource-based on-chain throttling
    description: Write throughput is governed by the account's CPU and NET budget; running out triggers
      tx_cpu_usage_exceeded or tx_net_usage_exceeded errors at submission time.
  - name: Self-host alternative
    description: Operators wanting predictable throughput typically run their own nodeos node rather
      than relying on shared public RPC.
maintainers:
